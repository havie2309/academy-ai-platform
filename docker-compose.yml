services:
  postgres:
    image: postgres:16
    container_name: pm2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pm2
      POSTGRES_USER: pm2_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pm2pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pm2_user -d pm2"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["code"]

  mongodb:
    image: mongo:7
    container_name: pm2_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: pm2_user
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-pm2pass}
      MONGO_INITDB_DATABASE: pm2
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["code"]

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: pm2_milvus
    restart: unless-stopped
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      - etcd
      - minio
    profiles: ["code"]

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: pm2_etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    deploy:
      resources:
        limits:
          memory: 256m
    profiles: ["code"]

  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    container_name: pm2_minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/data
    command: minio server /data
    deploy:
      resources:
        limits:
          memory: 256m
    profiles: ["code"]

  redis:
    image: redis:7-alpine
    container_name: pm2_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["code"]

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: pm2_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: pm2_user
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-pm2pass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["code"]

volumes:
  postgres_data:
  mongo_data:
  milvus_data:
  etcd_data:
  minio_data:
  redis_data:
  rabbitmq_data:
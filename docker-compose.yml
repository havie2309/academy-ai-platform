services:
  postgres:
    image: postgres:16
    container_name: pm2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pm2
      POSTGRES_USER: pm2_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pm2pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pm2_user -d pm2"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["code", "secure-etl"]
    networks:
      - data_internal

  mongodb:
    image: mongo:7
    container_name: pm2_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: pm2_user
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-pm2pass}
      MONGO_INITDB_DATABASE: pm2
    volumes:
      - mongo_data:/data/db
      - ./infra/mongodb/init:/docker-entrypoint-initdb.d
    ports:
      - "27017:27017"
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["code", "secure-etl"]
    networks:
      - data_internal

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: pm2_milvus
    restart: unless-stopped
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      - etcd
      - minio
    profiles: ["code"]

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: pm2_etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    deploy:
      resources:
        limits:
          memory: 256m
    profiles: ["code"]

  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    container_name: pm2_minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/data
    command: minio server /data
    deploy:
      resources:
        limits:
          memory: 256m
    profiles: ["code"]

  redis:
    image: redis:7-alpine
    container_name: pm2_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["code", "secure-etl"]
    networks:
      - data_internal

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: pm2_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: pm2_user
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-pm2pass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["code"]

  user-management:
    build:
      context: ./services/platform
      dockerfile: apps/user-management/Dockerfile
    container_name: pm2_user_management
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: pm2
      POSTGRES_USER: pm2_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pm2pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      USER_MANAGEMENT_PORT: 3001
      WEB_URL: ${WEB_URL:-http://localhost:5173}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["code", "secure-etl"]
    networks:
      - platform_internal
      - data_internal

  api-gateway:
    build:
      context: ./services/platform
      dockerfile: apps/api-gateway/Dockerfile
    container_name: pm2_api_gateway
    restart: unless-stopped
    environment:
      APP_PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      WEB_URL: ${WEB_URL:-http://localhost:5173}
      GATEWAY_TRUST_PROXY: ${GATEWAY_TRUST_PROXY:-false}
      NETWORK_RESTRICTED_PATHS: ${NETWORK_RESTRICTED_PATHS:-/api/etl}
      NETWORK_COUNTRY_HEADER: ${NETWORK_COUNTRY_HEADER:-x-geo-country}
      NETWORK_ALLOWED_COUNTRIES: ${NETWORK_ALLOWED_COUNTRIES:-}
      NETWORK_BLOCKED_COUNTRIES: ${NETWORK_BLOCKED_COUNTRIES:-}
      USER_MANAGEMENT_URL: http://user-management:3001
      CHAT_URL: ${CHAT_URL:-http://host.docker.internal:3002}
      RBAC_URL: ${RBAC_URL:-http://host.docker.internal:3003}
      ADMIN_CONFIG_URL: ${ADMIN_CONFIG_URL:-http://host.docker.internal:3004}
      AUDIT_URL: ${AUDIT_URL:-http://host.docker.internal:3005}
      RAG_ENGINE_URL: ${RAG_ENGINE_URL:-http://host.docker.internal:8000}
      ETL_URL: http://etl-sync:8004
      ETL_INTERNAL_AUTH_HEADER: ${ETL_INTERNAL_AUTH_HEADER:-x-etl-internal-secret}
      ETL_INTERNAL_SHARED_SECRET: ${ETL_INTERNAL_SHARED_SECRET:-dev-etl-internal-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      user-management:
        condition: service_started
      etl-sync:
        condition: service_started
      redis:
        condition: service_healthy
    profiles: ["secure-etl"]
    networks:
      - edge
      - platform_internal
      - etl_internal

  etl-sync:
    build:
      context: ./services/etl-sync
    container_name: pm2_etl_sync
    restart: unless-stopped
    environment:
      ETL_STORE_BACKEND: postgres
      ETL_SCHEDULER_ENABLED: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: pm2
      POSTGRES_USER: pm2_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pm2pass}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: pm2
      MONGO_USER: pm2_user
      MONGO_PASSWORD: ${MONGO_PASSWORD:-pm2pass}
      ETL_INTERNAL_AUTH_HEADER: ${ETL_INTERNAL_AUTH_HEADER:-x-etl-internal-secret}
      ETL_INTERNAL_SHARED_SECRET: ${ETL_INTERNAL_SHARED_SECRET:-dev-etl-internal-secret}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    profiles: ["secure-etl"]
    networks:
      - etl_internal
      - data_internal

volumes:
  postgres_data:
  mongo_data:
  milvus_data:
  etcd_data:
  minio_data:
  redis_data:
  rabbitmq_data:

networks:
  edge:
  platform_internal:
  etl_internal:
    internal: true
  data_internal:
